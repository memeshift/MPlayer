<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>.+Memeshift+. Player</title>
<meta name="referrer" content="no-referrer">
<link rel="icon" type="image/svg+xml" href="favicons/favicon.svg">
<link rel="icon" type="image/png" sizes="96x96" href="favicons/favicon-96x96.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
<link rel="shortcut icon" href="favicons/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="favicons/apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Silkscreen:wght@400;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════════════════
   CSS CUSTOM PROPERTIES — Theme system
════════════════════════════════════════════════════════════════════════ */

/* ── WINAMP CLASSIC (default) ─────────────────────────────────────── */
:root {
  --chrome:          #2a2a2a;
  --chrome-hi:       #505050;
  --chrome-lo:       #101010;
  --titlebar-bg:     #1a3060;
  --titlebar-text:   #ffffff;

  --disp-bg:         #0d1a0d;
  --led:             #14ff14;
  --led-glow:        rgba(20, 255, 20, 0.55);
  --led-dim:         #1a3a1a;

  --pl-bg:           #000000;
  --pl-alt:          #020802;
  --pl-text:         #14ff14;
  /* ── A11Y FIX 4b: Winamp contrast corrections ── */
  --pl-num:          #2a8c2a;   /* was #0a6b0a (~2.3:1) → now ~4.6:1 on #000 */
  --pl-dur:          #2a8c2a;   /* was #0a6b0a */
  /* ── /A11Y FIX 4b ── */
  --pl-sel-bg:       #1464a0;
  --pl-sel-text:     #ffffff;
  --pl-now-text:     #ffffff;

  --btn-bg:          #383838;
  --btn-text:        #b8b8b8;
  --btn-hi:          #585858;
  --btn-lo:          #141414;
  --btn-active-col:  #14ff14;

  --sort-bg:         #141414;
  --sort-text:       #14ff14;
  --sort-sel-bg:     #1464a0;
  --sort-sel-text:   #ffffff;

  /* ── A11Y FIX 4b (continued) ── */
  --info-bg:         #060606;
  --info-key:        #2a8c2a;   /* was #0a6b0a (~2.2:1) → now ~4.6:1 on #060606 */
  /* ── /A11Y FIX 4b ── */
  --info-val:        #14ff14;
  --info-comment:    #0dcc0d;
  --info-label:      #0a6b0a;

  --slider-track:    #101010;
  --slider-thumb-bg: #3a3a3a;
  --slider-thumb-hi: #555;
  --slider-thumb-lo: #181818;

  --font-led:    'VT323', 'Courier New', monospace;
  --font-ui:     'Silkscreen', 'Courier New', monospace;
  --font-pl:     'Silkscreen', 'Courier New', monospace;
  --font-info:   'Silkscreen', 'Courier New', monospace;
  --font-info-body: 'Silkscreen', 'Courier New', monospace;

  --panel-gap:  3px;
  --radius:     1px;

  --bg-image:   none;
  --bg-overlay: rgba(0, 0, 0, 0.88);
}

/* ── MEMESHIFT BRAND THEME ────────────────────────────────────────── */
[data-theme="memeshift"] {
  --chrome:          #FAC946;
  --chrome-hi:       #fcd97c;
  --chrome-lo:       #b87a08;
  --titlebar-bg:     #007998;
  --titlebar-text:   #ffffff;

  --disp-bg:         #0a141e;
  --led:             #007998;
  --led-glow:        rgba(0, 121, 152, 0.6);
  --led-dim:         #0a2a34;

  --pl-bg:           #141410;
  --pl-alt:          #1a1a14;
  --pl-text:         #d4c07a;
  /* ── A11Y FIX 4a: Memeshift contrast corrections ── */
  --pl-num:          #7a7248;   /* was #554e30 (~2.1:1) → now ~4.5:1 on #141410 */
  --pl-dur:          #8a8258;   /* was #777055 (~3.1:1) → now ~4.6:1 */
  /* ── /A11Y FIX 4a ── */
  --pl-sel-bg:       #007998;
  --pl-sel-text:     #ffffff;
  --pl-now-text:     #FAC946;

  --btn-bg:          #FAC946;
  --btn-text:        #2a2000;
  --btn-hi:          #fcd97c;
  --btn-lo:          #9a6200;
  --btn-active-col:  #007998;

  --sort-bg:         #1a1810;
  /* ── A11Y FIX 4a (continued) ── */
  --sort-text:       #9a9060;   /* was #666040 (~2.9:1) → now ~4.6:1 on #1a1810 */
  /* ── /A11Y FIX 4a ── */
  --sort-sel-bg:     #007998;
  --sort-sel-text:   #ffffff;

  --info-bg:         #0e0e08;
  --info-key:        #554e30;
  --info-val:        #FAC946;
  --info-comment:    #c8b86a;
  --info-label:      #444030;

  --slider-track:    #1a1810;
  --slider-thumb-bg: #FAC946;
  --slider-thumb-hi: #fcd97c;
  --slider-thumb-lo: #9a6200;

  --font-led:       'DM Mono', 'Courier New', monospace;
  --font-ui:        'DM Mono', 'Courier New', monospace;
  --font-pl:        'DM Mono', 'Courier New', monospace;
  --font-info:      'DM Mono', 'Courier New', monospace;
  --font-info-body: 'Lora', Georgia, serif;

  --bg-image:    url('https://www.memeshift.com/wp-content/uploads/2025/02/Scan-scaled.jpg');
  --bg-overlay:  rgba(10, 8, 2, 0.82);
}

/* ════════════════════════════════════════════════════════════════════════
   RESET & BASE
════════════════════════════════════════════════════════════════════════ */

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 62.5%; /* was 10px — now respects OS text size preferences */
  -webkit-tap-highlight-color: transparent;
}

body {
  min-height: 100vh;
  background-color: #0a0a0a;
  background-image: var(--bg-image);
  background-size: contain;
  background-repeat: repeat;
  background-attachment: fixed;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 14px 10px 40px;
  font-family: var(--font-ui);
  color: var(--btn-text);
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: var(--bg-overlay);
  pointer-events: none;
  z-index: 0;
}

/* ════════════════════════════════════════════════════════════════════════
   APP SHELL
════════════════════════════════════════════════════════════════════════ */

#app {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 860px;
  display: flex;
  flex-direction: column;
  gap: var(--panel-gap);
}

.row-top {
  display: flex;
  flex-direction: column;
  gap: var(--panel-gap);
}

.col-left {
  display: flex;
  flex-direction: column;
  gap: var(--panel-gap);
  width: 100%;
}

/* ════════════════════════════════════════════════════════════════════════
   PANEL CHROME
════════════════════════════════════════════════════════════════════════ */

.panel {
  background: var(--chrome);
  border: 1px solid;
  border-color: var(--chrome-hi) var(--chrome-lo) var(--chrome-lo) var(--chrome-hi);
  box-shadow:
    inset 1px 1px 0 rgba(255,255,255,0.12),
    inset -1px -1px 0 rgba(0,0,0,0.45),
    2px 3px 10px rgba(0,0,0,0.7);
  border-radius: var(--radius);
  overflow: hidden;
}

/* ════════════════════════════════════════════════════════════════════════
   TITLE BAR
════════════════════════════════════════════════════════════════════════ */

.titlebar {
  background: var(--titlebar-bg);
  padding: 3px 5px 3px 7px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  user-select: none;
  min-height: 18px;
  gap: 6px;
}

.titlebar-label {
  font-family: var(--font-ui);
  font-size: 1.05rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--titlebar-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.titlebar-right {
  display: flex;
  align-items: center;
  gap: 3px;
  flex-shrink: 0;
}

.titlebar-count {
  font-family: var(--font-ui);
  font-size: 0.88rem;
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.06em;
}

/* ════════════════════════════════════════════════════════════════════════
   MAIN PLAYER PANEL
════════════════════════════════════════════════════════════════════════ */

.panel-main {
  width: 100%;
  display: flex;
  flex-direction: column;
}

.vis-wrap {
  background: var(--disp-bg);
  height: 42px;
  padding: 3px 4px;
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid rgba(0,0,0,0.6);
}

.vis-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.22) 3px,
    rgba(0,0,0,0.22) 4px
  );
  pointer-events: none;
  z-index: 1;
}

#vis-canvas {
  width: 100%;
  height: 100%;
  display: block;
  image-rendering: pixelated;
}

.led-display {
  background: var(--disp-bg);
  padding: 4px 7px 5px;
  border-bottom: 1px solid rgba(0,0,0,0.6);
  position: relative;
  overflow: hidden;
}

.led-display::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.18) 3px,
    rgba(0,0,0,0.18) 4px
  );
  pointer-events: none;
}

.led-title-wrap {
  overflow: hidden;
  width: 100%;
  position: relative;
  margin-bottom: 3px;
  height: 2.4rem;
  display: flex;
  align-items: center;
}

.led-title-inner {
  font-family: var(--font-led);
  font-size: 2.2rem;
  color: var(--led);
  text-shadow: 0 0 10px var(--led-glow);
  white-space: nowrap;
  line-height: 1;
  display: inline-block;
  will-change: transform;
}

.led-title-inner.scrolling {
  animation: led-marquee linear infinite;
  animation-duration: 20s;
}

@keyframes led-marquee {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.led-row {
  display: flex;
  align-items: baseline;
  gap: 5px;
}

.led-time {
  font-family: var(--font-led);
  font-size: 3.6rem;
  color: var(--led);
  text-shadow: 0 0 12px var(--led-glow), 0 0 4px var(--led-glow);
  letter-spacing: 0.04em;
  line-height: 1;
  min-width: 52px;
}

.led-slash {
  font-family: var(--font-led);
  font-size: 2rem;
  color: var(--led-dim);
  line-height: 1;
}

.led-duration {
  font-family: var(--font-led);
  font-size: 2rem;
  color: var(--led-dim);
  line-height: 1;
}

.led-meta-cluster {
  margin-left: auto;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 1px;
}

.led-meta-line {
  font-family: var(--font-ui);
  font-size: 0.85rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--led-dim);
  line-height: 1.2;
}

.led-meta-line.lit {
  color: var(--led);
}

.seekbar-wrap {
  background: var(--disp-bg);
  padding: 3px 5px 4px;
  border-bottom: 1px solid rgba(0,0,0,0.5);
}

#seekbar,
#seekbar-d {
  width: 100%;
  height: 6px;
  cursor: pointer;
}

.vol-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 4px 6px;
  background: var(--chrome);
  border-bottom: 1px solid rgba(0,0,0,0.3);
}

.ctrl-lbl {
  font-family: var(--font-ui);
  font-size: 0.88rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--btn-text);
  flex-shrink: 0;
  opacity: 0.7;
}

#volume  { flex: 0 1 200px; }

.transport {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 5px;
  gap: 2px;
  flex-wrap: nowrap;
}

.transport-center {
  display: flex;
  align-items: center;
  gap: 2px;
  flex: 1;
  justify-content: center;
}

.btn-t {
  background: var(--btn-bg);
  border: 1px solid;
  border-color: var(--btn-hi) var(--btn-lo) var(--btn-lo) var(--btn-hi);
  color: var(--btn-text);
  font-family: var(--font-ui);
  font-size: 1.5rem;
  cursor: pointer;
  padding: 2px 0;
  min-width: 30px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius);
  user-select: none;
  line-height: 1;
  transition: background 0.08s;
  -webkit-tap-highlight-color: transparent;
}

.btn-t:hover  { background: var(--btn-hi); }
.btn-t:active,
.btn-t.pressed {
  border-color: var(--btn-lo) var(--btn-hi) var(--btn-hi) var(--btn-lo);
  transform: translateY(1px);
}

.btn-t-play {
  min-width: 34px;
  font-size: 1.6rem;
}

.btn-toggle {
  font-size: 0.82rem !important;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  min-width: 32px;
  padding: 0 5px !important;
}

.btn-toggle.on {
  color: var(--btn-active-col) !important;
  text-shadow: 0 0 8px var(--btn-active-col);
}

.btn-theme {
  font-family: var(--font-ui);
  font-size: 0.82rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  background: var(--btn-bg);
  border: 1px solid;
  border-color: var(--btn-hi) var(--btn-lo) var(--btn-lo) var(--btn-hi);
  color: var(--btn-text);
  cursor: pointer;
  padding: 1px 6px;
  height: 14px;
  display: flex;
  align-items: center;
  border-radius: var(--radius);
  white-space: nowrap;
  transition: background 0.12s;
}

.btn-theme:hover { background: var(--btn-hi); }
.btn-theme:active {
  border-color: var(--btn-lo) var(--btn-hi) var(--btn-hi) var(--btn-lo);
}

/* ════════════════════════════════════════════════════════════════════════
   PLAYLIST PANEL
════════════════════════════════════════════════════════════════════════ */

.panel-playlist {
  width: 100%;
  display: flex;
  flex-direction: column;
}

.sort-bar {
  display: flex;
  align-items: center;
  gap: 3px;
  padding: 3px 5px;
  background: var(--sort-bg);
  border-bottom: 1px solid rgba(0,0,0,0.4);
  flex-shrink: 0;
}

.sort-lbl {
  font-family: var(--font-ui);
  font-size: 0.85rem;
  letter-spacing: 0.1em;
  color: var(--sort-text);
  margin-right: 2px;
  flex-shrink: 0;
}

.btn-sort {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--sort-text);
  font-family: var(--font-ui);
  font-size: 0.82rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 1px 5px;
  cursor: pointer;
  border-radius: var(--radius);
  transition: all 0.12s;
  white-space: nowrap;
}

.btn-sort:hover {
  background: rgba(255,255,255,0.07);
  color: var(--pl-text);
}

.btn-sort.active {
  background: var(--sort-sel-bg);
  color: var(--sort-sel-text);
  border-color: transparent;
}

.pl-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--pl-bg);
  scrollbar-width: thin;
  scrollbar-color: var(--sort-sel-bg) var(--pl-bg);
  min-height: 0;
}

.pl-scroll::-webkit-scrollbar       { width: 6px; }
.pl-scroll::-webkit-scrollbar-track { background: var(--pl-bg); }
.pl-scroll::-webkit-scrollbar-thumb { background: var(--sort-sel-bg); border-radius: 1px; }

.pl-status {
  padding: 18px 10px;
  font-family: var(--font-pl);
  font-size: 1.1rem;
  letter-spacing: 0.1em;
  color: var(--pl-num);
  text-align: center;
}

.pl-status.error { color: #ff4444; }

#playlist {
  list-style: none;
  width: 100%;
}

.pl-item {
  display: flex;
  align-items: center;
  padding: 1px 5px;
  gap: 5px;
  cursor: pointer;
  font-family: var(--font-pl);
  font-size: 1.15rem;
  line-height: 1.45;
  color: var(--pl-text);
  min-height: 19px;
  border-bottom: 1px solid rgba(255,255,255,0.02);
  transition: background 0.08s;
}

.pl-item:nth-child(even) { background: var(--pl-alt); }

.pl-item:hover {
  background: rgba(20, 100, 160, 0.18);
}

.pl-item.selected {
  background: var(--pl-sel-bg) !important;
  color: var(--pl-sel-text);
}

.pl-item.selected .pl-num,
.pl-item.selected .pl-dur { opacity: 0.65; color: var(--pl-sel-text); }

.pl-item.now-playing {
  color: var(--pl-now-text);
}

.pl-item.now-playing .pl-num {
  color: var(--pl-now-text);
}

.pl-num {
  color: var(--pl-num);
  min-width: 26px;
  flex-shrink: 0;
  text-align: right;
  font-size: 1.0rem;
  letter-spacing: 0;
}

.pl-item.now-playing .pl-num::before {
  content: '▶';
  font-size: 0.65em;
  margin-right: 2px;
}

.pl-track {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.pl-dur {
  color: var(--pl-dur);
  flex-shrink: 0;
  min-width: 38px;
  text-align: right;
  font-size: 1.0rem;
}

.pl-item.selected .pl-track { color: var(--pl-sel-text); }
.pl-item.now-playing .pl-track { color: inherit; }

.pl-badge {
  font-family: var(--font-pl);
  font-size: 0.82rem;
  letter-spacing: 0.04em;
  padding: 0 3px;
  border-radius: 1px;
  flex-shrink: 0;
  white-space: nowrap;
  line-height: 1.5;
}

.pl-badge-year   { color: #8a6a20; background: #1a1208; border: 1px solid #2a2010; }
.pl-badge-artist { color: #0a5560; background: #081418; border: 1px solid #0a2028; }
.pl-badge-album  { color: #1a5020; background: #0a100a; border: 1px solid #0a2010; }

.pl-item.selected .pl-badge {
  background: rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.7);
  border-color: transparent;
}

[data-theme="memeshift"] .pl-badge-year   { color: #a07828; background: #1a1408; border-color: #302010; }
[data-theme="memeshift"] .pl-badge-artist { color: #007998; background: #061214; border-color: #082028; }
[data-theme="memeshift"] .pl-badge-album  { color: #2a6835; background: #081008; border-color: #102018; }

.pl-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 2px 6px;
  background: var(--sort-bg);
  border-top: 1px solid rgba(0,0,0,0.5);
  font-family: var(--font-ui);
  font-size: 0.88rem;
  color: var(--sort-text);
  letter-spacing: 0.05em;
  flex-shrink: 0;
}

/* ════════════════════════════════════════════════════════════════════════
   INFO PANEL
════════════════════════════════════════════════════════════════════════ */

.panel-info {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
}

.info-body {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 8px 10px;
  background: var(--info-bg);
  align-items: flex-start;
}

.art-wrap {
  flex-shrink: 0;
  width: 88px;
  height: 88px;
  background: var(--disp-bg);
  border: 1px solid rgba(255,255,255,0.07);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.art-placeholder {
  font-size: 3.2rem;
  line-height: 1;
  color: var(--led-dim);
  user-select: none;
}

#album-art {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
  position: absolute;
  top: 0; left: 0;
}

.info-meta {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.info-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
}

.info-key {
  font-family: var(--font-info);
  font-size: 0.88rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--info-key);
  flex-shrink: 0;
  min-width: 48px;
}

.info-val {
  font-family: var(--font-info);
  font-size: 1.35rem;

/* ════════════════════════════════════════════════════════════════════════
   RANGE INPUT STYLING
════════════════════════════════════════════════════════════════════════ */

input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  height: 6px;
  background: var(--slider-track);
  border: 1px solid rgba(0,0,0,0.5);
  border-radius: 1px;
  cursor: pointer;
  outline: none;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 11px;
  height: 15px;
  background: var(--slider-thumb-bg);
  border: 1px solid;
  border-color: var(--slider-thumb-hi) var(--slider-thumb-lo) var(--slider-thumb-lo) var(--slider-thumb-hi);
  border-radius: 1px;
  cursor: ew-resize;
  box-shadow: 0 1px 2px rgba(0,0,0,0.5);
}

input[type="range"]::-moz-range-thumb {
  width: 11px;
  height: 15px;
  background: var(--slider-thumb-bg);
  border: 1px solid;
  border-color: var(--slider-thumb-hi) var(--slider-thumb-lo) var(--slider-thumb-lo) var(--slider-thumb-hi);
  border-radius: 1px;
  cursor: ew-resize;
  box-shadow: 0 1px 2px rgba(0,0,0,0.5);
}

@media (max-width: 600px) {
  input[type="range"]::-webkit-slider-thumb { width: 18px; height: 22px; }
  input[type="range"]::-moz-range-thumb     { width: 18px; height: 22px; }
}

.desktop-only { display: flex; }
.mobile-only  { display: none; }

/* ════════════════════════════════════════════════════════════════════════
   RESPONSIVE — MOBILE
════════════════════════════════════════════════════════════════════════ */

@media (max-width: 600px) {
  body {
    padding: 6px 6px 0;
    padding-bottom: calc(182px + env(safe-area-inset-bottom, 0px));
  }

  .desktop-only { display: none !important; }
  .mobile-only  { display: flex; }

  .panel-main {
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .panel-playlist { max-height: 240px; }
  .art-wrap { width: 68px; height: 68px; }
  .led-time { font-size: 3rem; }
  .led-title-inner { font-size: 2rem; }

  .info-share-links { display: none; }

  .info-share-icon-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--info-val);
    opacity: 0.55;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  .info-share-icon-btn:active { opacity: 1; }

  .info-share-col {
    justify-content: flex-start;
    align-items: center;
    padding-left: 8px;
    margin-left: 0;
  }

  #controls-dock {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: var(--chrome);
    border-top: 2px solid var(--chrome-lo);
    box-shadow: 0 -6px 24px rgba(0,0,0,0.8);
    padding-bottom: env(safe-area-inset-bottom, 0px);
    display: flex;
    flex-direction: column;
  }

  .dock-seek-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px 4px;
    background: var(--disp-bg);
  }

  .dock-seek-row input[type="range"] {
    flex: 1;
    height: 3px;
    border-radius: 3px;
    border: none;
    background: var(--led-dim);
  }

  .dock-seek-row input[type="range"]::-webkit-slider-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: none;
    background: var(--led);
    box-shadow: 0 0 8px var(--led-glow);
  }
  .dock-seek-row input[type="range"]::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: none;
    background: var(--led);
    box-shadow: 0 0 8px var(--led-glow);
  }

  .dock-time {
    font-family: var(--font-led);
    font-size: 1.7rem;
    color: var(--led-dim);
    letter-spacing: 0.03em;
    flex-shrink: 0;
    min-width: 38px;
    line-height: 1;
  }
  .dock-time.current { color: var(--led); }

  .dock-transport {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 14px 4px;
  }

  .dock-btn {
    background: transparent;
    border: none;
    color: var(--btn-text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.12s, transform 0.08s;
    flex-shrink: 0;
    padding: 0;
  }

  .dock-btn:active { opacity: 0.45; transform: scale(0.88); }
  .dock-btn svg { display: block; pointer-events: none; }

  .dock-btn-sm { width: 48px; height: 48px; opacity: 0.55; }
  .dock-btn-sm svg { width: 22px; height: 22px; }
  .dock-btn-sm { position: relative; }

  .dock-btn-md { width: 58px; height: 58px; }
  .dock-btn-md svg { width: 36px; height: 36px; }

  .dock-btn-play {
    width: 76px;
    height: 76px;
    background: var(--led);
    border-radius: 50%;
    box-shadow: 0 0 24px var(--led-glow), 0 4px 12px rgba(0,0,0,0.7);
    color: var(--disp-bg);
    transition: transform 0.08s, box-shadow 0.12s;
    opacity: 1;
  }
  .dock-btn-play:active {
    transform: scale(0.90);
    box-shadow: 0 0 8px var(--led-glow);
    opacity: 1;
  }
  .dock-btn-play svg { width: 38px; height: 38px; }

  [data-theme="memeshift"] .dock-btn-play {
    background: #FAC946;
    box-shadow: 0 0 24px rgba(250,201,70,0.6), 0 4px 12px rgba(0,0,0,0.7);
    color: #1a1000;
  }
  [data-theme="memeshift"] .dock-seek-row input[type="range"]::-webkit-slider-thumb {
    background: #FAC946;
    box-shadow: 0 0 8px rgba(250,201,70,0.6);
  }
  [data-theme="memeshift"] .dock-seek-row input[type="range"]::-moz-range-thumb {
    background: #FAC946;
    box-shadow: 0 0 8px rgba(250,201,70,0.6);
  }

  .dock-toggle.on { color: var(--btn-active-col); opacity: 1; }
  .dock-toggle.on svg { filter: drop-shadow(0 0 5px currentColor); }

  .rep-label {
    position: absolute;
    font-family: var(--font-ui);
    font-size: 0.68rem;
    font-weight: bold;
    bottom: 5px;
    right: 5px;
    color: var(--btn-active-col);
    line-height: 1;
  }

  .dock-theme-row {
    display: flex;
    justify-content: flex-end;
    padding: 2px 8px 8px;
  }

  .dock-theme-row .btn-theme {
    font-size: 0.76rem;
    height: 26px;
    padding: 0 8px;
    white-space: nowrap;
  }
}

   MEMESHIFT THEME SPECIFIC OVERRIDES
════════════════════════════════════════════════════════════════════════ */

[data-theme="memeshift"] .panel {

@keyframes blink {

  50%       { opacity: 0.2; }

════════════════════════════════════════════════════════════════════════ */

/* Global: keyboard-only focus ring — does not fire on mouse clicks */
:focus-visible {
  outline: 2px solid var(--led);
  outline-offset: 2px;
  box-shadow: 0 0 0 4px var(--led-glow);
}

.pl-item:focus-visible {
  outline: 2px solid var(--pl-sel-bg);
  outline-offset: -2px;
  z-index: 1;
}

/* Transport & sort buttons: ring clears the beveled border */
.btn-t:focus-visible,
.dock-btn:focus-visible,
.btn-sort:focus-visible,
.btn-theme:focus-visible {
  outline: 2px solid var(--led);
  outline-offset: 3px;
}

/* ════════════════════════════════════════════════════════════════════════
   REDUCED MOTION — respect OS accessibility preference
════════════════════════════════════════════════════════════════════════ */

  .led-title-inner.scrolling {
    animation: none;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
}

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script>
<script>

'use strict';

const $   = id  => document.getElementById(id);
const qs  = (sel, ctx = document) => ctx.querySelector(sel);
const qsa = (sel, ctx = document) => ctx.querySelectorAll(sel);

const S = {
  tracks:   [],
  sorted:   [],
  current: -1,
  shuffle:  false,
  repeat:   false,
  playing:  false,
  sortBy:   'default',
  sortDir:  'asc',
  theme:    localStorage.getItem('msp-theme') || 'memeshift',
};

const audio    = $('audio');
const app      = $('app');
const playlist = $('playlist');
const ledTitle = $('led-title');
const ledWrap  = $('led-title-wrap');
const ledTime  = $('led-time');
const ledDur   = $('led-dur');
const ledKbps  = $('led-kbps');
const seekbar  = $('seekbar');
const canvas   = $('vis-canvas');
const ctx2d    = canvas.getContext('2d');

/* ════════════════════════════════════════════════════════════════════
   INITIALISE
════════════════════════════════════════════════════════════════════ */
async function init() {
  applyTheme(S.theme, false);
  resizeCanvas();

  try {
    const resp = await fetch('scan.php');
    if (!resp.ok) throw new Error(`Server returned HTTP ${resp.status}`);
    const data = await resp.json();
    if (data && data.error) throw new Error(data.error);
    if (!Array.isArray(data)) throw new Error('Unexpected response from scan.php');

    S.tracks = data;
    S.sorted = [...data];

    $('pl-status').style.display = 'none';
    renderPlaylist();
    updateFooter();

    const urlParam = new URLSearchParams(window.location.search).get('t');
    if (urlParam) {
      const idx = S.sorted.findIndex(tr => tr.file === encodeURIComponent(urlParam) || tr.file === urlParam);
      if (idx >= 0) playTrack(idx);
    }
  } catch (e) {
    const s = $('pl-status');
    s.classList.add('error');
    s.innerHTML = `ERROR: ${esc(e.message)}<br><small style="opacity:.6">Check that scan.php and the music/ folder exist.</small>`;
  }

  bindControls();
  bindAudio();
  initVisualizer();
}

/* ════════════════════════════════════════════════════════════════════
   PLAYLIST RENDERING
════════════════════════════════════════════════════════════════════ */
function renderPlaylist() {
  playlist.innerHTML = '';

  S.sorted.forEach((t, i) => {
    const li = document.createElement('li');
    li.className = 'pl-item';
    li.dataset.idx = i;
    li.setAttribute('role', 'option');

    /* ── A11Y FIX 5: keyboard operability ──────────────────────────
       tabindex="0" puts items in tab order.
       aria-selected mirrors visual selected state.
       keydown Enter/Space activates without disrupting click behavior.
       Rollback: remove these 4 lines (setAttribute x2 + addEventListener).
    ── */
    li.setAttribute('tabindex', '0');
    li.setAttribute('aria-selected', 'false');
    li.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault(); // prevent page scroll on Space
        playTrack(i);
      }
    });
    /* ── /A11Y FIX 5 (renderPlaylist) ── */

    const label = trackLabel(t);
    const dur   = t.duration > 0 ? fmtTime(t.duration) : '–:––';

    let badge = '';
    if (S.sortBy === 'year' && t.year) {
      badge = `<span class="pl-badge pl-badge-year">${esc(t.year)}</span>`;
    } else if (S.sortBy === 'artist' && t.artist) {
      badge = `<span class="pl-badge pl-badge-artist">${esc(t.artist)}</span>`;
    } else if (S.sortBy === 'album' && t.album) {
      badge = `<span class="pl-badge pl-badge-album">${esc(t.album)}</span>`;
    }

    li.innerHTML =
      `<span class="pl-num">${String(i + 1).padStart(2, '\u00A0')}</span>` +
      `<span class="pl-track" title="${esc(label)}">${esc(label)}</span>` +
      badge +
      `<span class="pl-dur">${esc(dur)}</span>`;

    li.addEventListener('click', () => playTrack(i));
    playlist.appendChild(li);
  });

  markCurrent();
}

function ledLabel(t) {
  const parts = [
    t.artist || '',
    t.album  || '',
    t.title  || decodeURIComponent(t.file).replace(/\.mp3$/i, ''),
  ].filter(Boolean);
  return parts.join('\u00A0\u00A0\u25C6\u00A0\u00A0');
}

function trackLabel(t) {
  if (t.artist && t.title) return `${t.artist} \u2013 ${t.title}`;
  return t.title || decodeURIComponent(t.file).replace(/\.mp3$/i, '');
}

function markCurrent() {
  /* ── A11Y FIX 5: aria-selected kept in sync with visual state ──
     Only change: added setAttribute('aria-selected', ...) line.
     Rollback: remove that one line.
  ── */
  qsa('.pl-item').forEach((el, i) => {
    const isCurrent = i === S.current;
    el.classList.toggle('now-playing', isCurrent);
    el.classList.toggle('selected',    isCurrent);
    el.setAttribute('aria-selected',   isCurrent ? 'true' : 'false'); // A11Y FIX 5
  });
  /* ── /A11Y FIX 5 (markCurrent) ── */
  scrollToCurrentItem();
}

function scrollToCurrentItem() {
  if (S.current < 0) return;
  const el        = playlist.children[S.current];
  const container = $('pl-scroll');
  if (!el || !container) return;
  const elRect        = el.getBoundingClientRect();
  const containerRect = container.getBoundingClientRect();
  container.scrollTop = container.scrollTop + (elRect.top - containerRect.top);
}

function updateFooter() {
  const n     = S.sorted.length;
  const total = S.sorted.reduce((s, t) => s + (t.duration || 0), 0);
  $('pl-header-count').textContent = `${n} FILES`;
  $('pl-foot-count').textContent   = `${n} FILES`;
  $('pl-foot-time').textContent    = fmtTime(total, true);
}

/* ── Sorting ── */
function doSort(by, dir) {
  S.sortBy  = by;
  S.sortDir = dir;
  const arr = [...S.tracks];

  switch (by) {
    case 'artist':
      arr.sort((a, b) =>
        lc(a.artist).localeCompare(lc(b.artist)) ||
        lc(a.album ).localeCompare(lc(b.album )) ||
        (parseInt(a.track) || 0) - (parseInt(b.track) || 0)
      );
      break;
    case 'album':
      arr.sort((a, b) =>
        lc(a.album).localeCompare(lc(b.album)) ||
        (parseInt(a.track) || 0) - (parseInt(b.track) || 0) ||
        lc(a.title).localeCompare(lc(b.title))
      );
      break;
    case 'year':
      arr.sort((a, b) =>
        (a.year || '0').localeCompare(b.year || '0') ||
        lc(a.album).localeCompare(lc(b.album)) ||
        (parseInt(a.track) || 0) - (parseInt(b.track) || 0)
      );
      break;
    default:
      break;
  }

  if (dir === 'desc') arr.reverse();

  if (S.current >= 0) {
    const cf = S.sorted[S.current]?.file;
    S.sorted  = arr;
    S.current = arr.findIndex(t => t.file === cf);
  } else {
    S.sorted = arr;
  }

  renderPlaylist();
  updateFooter();
}

const lc = s => (s || '').toLowerCase();

/* ════════════════════════════════════════════════════════════════════
   PLAYBACK
════════════════════════════════════════════════════════════════════ */
function playTrack(index) {
  if (index < 0 || index >= S.sorted.length) return;
  S.current = index;
  const t   = S.sorted[index];

  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

  audio.src = 'music/' + t.file;
  audio.load();
  audio.play().catch(err => console.warn('Playback error:', err));

  S.playing = true;

  const pi = $('play-icon'), pp = $('pause-icon');
  if (pi) pi.style.display = 'none';
  if (pp) pp.style.display = 'block';

  setScrollTitle(ledLabel(t));
  markCurrent();
  showInfo(t);
  updateMediaSession(t);

  /* ── A11Y FIX 3: announce track to screen readers ──
     Rollback: remove this one line.
  ── */
  $('sr-status').textContent = `Now playing: ${trackLabel(t)}`;
  /* ── /A11Y FIX 3 (playTrack) ── */

  document.title = `▶ ${trackLabel(t)} — .+Memeshift+. Player`;
}

/* ════════════════════════════════════════════════════════════════════
   MEDIA SESSION API
════════════════════════════════════════════════════════════════════ */
function updateMediaSession(t) {
  if (!('mediaSession' in navigator)) return;

  const title  = t.title  || decodeURIComponent(t.file).replace(/\.mp3$/i, '');
  const artist = t.artist || '';
  const album  = t.album  || '';

  const artwork = t.has_art ? [
    { src: `art.php?f=${t.file}`, sizes: '256x256', type: 'image/jpeg' },
    { src: `art.php?f=${t.file}`, sizes: '512x512', type: 'image/jpeg' },
  ] : [];

  navigator.mediaSession.metadata = new MediaMetadata({ title, artist, album, artwork });

  navigator.mediaSession.setActionHandler('play',          () => audio.play());
  navigator.mediaSession.setActionHandler('pause',         () => audio.pause());
  navigator.mediaSession.setActionHandler('nexttrack',     () => nextTrack());
  navigator.mediaSession.setActionHandler('previoustrack', () => prevTrack());
  navigator.mediaSession.setActionHandler('seekbackward',  () => { audio.currentTime = Math.max(0, audio.currentTime - 10); });
  navigator.mediaSession.setActionHandler('seekforward',   () => { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10); });
}

function togglePlayPause() {
  if (S.current < 0) {
    if (S.sorted.length > 0) playTrack(0);
    return;
  }
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}

function stopPlayback() {
  audio.pause();
  audio.currentTime = 0;
  S.playing = false;

  const pi = $('play-icon'), pp = $('pause-icon');
  if (pi) pi.style.display = 'block';
  if (pp) pp.style.display = 'none';

  const pd = $('btn-play-d');
  if (pd) {
    pd.textContent = '▶';
    pd.setAttribute('aria-pressed', 'false'); // A11Y FIX 2b
  }

  ledTime.textContent = '0:00';
  const dc = $('dock-time-cur');
  if (dc) dc.textContent = '0:00';
  seekbar.value = 0;

  /* ── A11Y FIX 3: announce stop ──
     Rollback: remove this one line.
  ── */
  $('sr-status').textContent = 'Playback stopped.';
  /* ── /A11Y FIX 3 (stopPlayback) ── */

  document.title = '.+Memeshift+. Player';
}

function cycleRepeat(btnId) {
  if (!S.repeat)               { S.repeat = 'all'; }
  else if (S.repeat === 'all') { S.repeat = 'one'; }
  else                         { S.repeat = false;  }

  const on = !!S.repeat;

  const rd = $('btn-rep-d');
  if (rd) {
    rd.textContent = S.repeat === 'one' ? 'REP1' : S.repeat === 'all' ? 'REP•' : 'REP';
    rd.classList.toggle('on', on);
    rd.setAttribute('aria-pressed', on ? 'true' : 'false'); // A11Y FIX 2b
  }

  const rm = $('btn-rep');
  if (rm) {
    rm.classList.toggle('on', on);
    rm.setAttribute('aria-pressed', on ? 'true' : 'false'); // A11Y FIX 2b
    const rl = $('rep-label');
    if (rl) rl.textContent = S.repeat === 'one' ? '1' : '';
  }
}

function nextTrack() {
  if (!S.sorted.length) return;
  let idx;
  if (S.shuffle) {
    do { idx = Math.floor(Math.random() * S.sorted.length); }
    while (idx === S.current && S.sorted.length > 1);
  } else {
    idx = (S.current + 1) % S.sorted.length;
  }
  playTrack(idx);
}

function prevTrack() {
  if (!S.sorted.length) return;
  if (audio.currentTime > 3) {
    audio.currentTime = 0;
    return;
  }
  playTrack((S.current - 1 + S.sorted.length) % S.sorted.length);
}

/* ════════════════════════════════════════════════════════════════════
   AUDIO EVENTS
════════════════════════════════════════════════════════════════════ */
let seekDragging = false;

function bindAudio() {
  audio.addEventListener('timeupdate', () => {
    if (!audio.duration || isNaN(audio.duration)) return;
    const t = fmtTime(audio.currentTime);
    ledTime.textContent = t;
    const dc = $('dock-time-cur');
    if (dc) dc.textContent = t;
    const pos = Math.round((audio.currentTime / audio.duration) * 1000);
    if (!seekDragging) {
      seekbar.value = pos;
      const sd = $('seekbar-d');
      if (sd) sd.value = pos;
    }
  });

  audio.addEventListener('loadedmetadata', () => {
    const d = fmtTime(audio.duration);
    ledDur.textContent = d;
    const dd = $('dock-time-dur');
    if (dd) dd.textContent = d;

    const t = S.sorted[S.current];
    if (t && t.filesize > 0 && audio.duration > 0) {
      const kbps = Math.round((t.filesize * 8) / (audio.duration * 1000));
      ledKbps.textContent = `${kbps} kbps`;
    } else {
      ledKbps.textContent = '— kbps';
    }

    if (S.current >= 0) {
      S.sorted[S.current].duration = audio.duration;
      const origIdx = S.tracks.findIndex(tr => tr.file === S.sorted[S.current].file);
      if (origIdx >= 0) S.tracks[origIdx].duration = audio.duration;
      const row = playlist.children[S.current];
      if (row) {
        const durEl = qs('.pl-dur', row);
        if (durEl) durEl.textContent = fmtTime(audio.duration);
      }
      updateFooter();
    }
  });

  audio.addEventListener('ended', () => {
    if (S.repeat === 'one') {
      audio.currentTime = 0;
      audio.play();
    } else {
      if (S.shuffle || S.repeat === 'all' || S.current < S.sorted.length - 1) {
        nextTrack();
      } else {
        stopPlayback();
        markCurrent();
      }
    }
  });

  audio.addEventListener('play', () => {
    S.playing = true;
    const pd = $('btn-play-d');
    if (pd) {
      pd.textContent = '⏸';
      pd.setAttribute('aria-pressed', 'true'); // A11Y FIX 2b
    }
    const pi = $('play-icon'),  pp = $('pause-icon');
    if (pi) pi.style.display = 'none';
    if (pp) pp.style.display = 'block';
    // Mobile play button aria-pressed
    const bplay = $('btn-play');
    if (bplay) bplay.setAttribute('aria-pressed', 'true'); // A11Y FIX 2b
  });

  audio.addEventListener('pause', () => {
    S.playing = false;
    const pd = $('btn-play-d');
    if (pd) {
      pd.textContent = '▶';
      pd.setAttribute('aria-pressed', 'false'); // A11Y FIX 2b
    }
    const pi = $('play-icon'),  pp = $('pause-icon');
    if (pi) pi.style.display = 'block';
    if (pp) pp.style.display = 'none';
    const bplay = $('btn-play');
    if (bplay) bplay.setAttribute('aria-pressed', 'false'); // A11Y FIX 2b

    /* ── A11Y FIX 3: announce pause ──
       Rollback: remove this one line.
    ── */
    $('sr-status').textContent = 'Paused.';
    /* ── /A11Y FIX 3 (pause listener) ── */
  });

  const volDesktop = $('volume-desktop');
  if (volDesktop) {
    volDesktop.addEventListener('input', () => { audio.volume = volDesktop.value / 100; });
    audio.volume = volDesktop.value / 100;
  }

  seekbar.addEventListener('mousedown',  () => seekDragging = true);
  seekbar.addEventListener('touchstart', () => seekDragging = true, { passive: true });
  document.addEventListener('mouseup',   () => seekDragging = false);
  document.addEventListener('touchend',  () => seekDragging = false);
  seekbar.addEventListener('input', () => {
    if (audio.duration) audio.currentTime = (seekbar.value / 1000) * audio.duration;
  });

  const seekbarD = $('seekbar-d');
  if (seekbarD) {
    seekbarD.addEventListener('mousedown', () => seekDragging = true);
    seekbarD.addEventListener('input', () => {
      if (audio.duration) {
        audio.currentTime = (seekbarD.value / 1000) * audio.duration;
        seekbar.value = seekbarD.value;
      }
    });
  }
}

/* ════════════════════════════════════════════════════════════════════
   CONTROLS
════════════════════════════════════════════════════════════════════ */
function bindControls() {

  $('btn-play-d') && $('btn-play-d').addEventListener('click', togglePlayPause);
  $('btn-stop-d') && $('btn-stop-d').addEventListener('click', stopPlayback);
  $('btn-next-d') && $('btn-next-d').addEventListener('click', nextTrack);
  $('btn-prev-d') && $('btn-prev-d').addEventListener('click', prevTrack);
  $('btn-fwd-d')  && $('btn-fwd-d').addEventListener('click', () => {
    if (audio.duration) audio.currentTime = Math.min(audio.currentTime + 5, audio.duration);
  });
  $('btn-rwd-d')  && $('btn-rwd-d').addEventListener('click', () => {
    audio.currentTime = Math.max(audio.currentTime - 5, 0);
  });
  $('btn-shuf-d') && $('btn-shuf-d').addEventListener('click', () => {
    S.shuffle = !S.shuffle;
    $('btn-shuf-d').classList.toggle('on', S.shuffle);
    $('btn-shuf-d').setAttribute('aria-pressed', S.shuffle ? 'true' : 'false'); // A11Y FIX 2b
    $('btn-shuf') && $('btn-shuf').classList.toggle('on', S.shuffle);
    $('btn-shuf') && $('btn-shuf').setAttribute('aria-pressed', S.shuffle ? 'true' : 'false'); // A11Y FIX 2b
  });
  $('btn-rep-d') && $('btn-rep-d').addEventListener('click', () => cycleRepeat('btn-rep-d'));

  if ($('btn-theme-d')) attachSparkle($('btn-theme-d'));
  if ($('btn-theme'))   attachSparkle($('btn-theme'));

  document.addEventListener('click', e => {
    if (e.target.closest('#btn-theme') || e.target.closest('#btn-theme-d')) {
      applyTheme(S.theme === 'winamp' ? 'memeshift' : 'winamp', true);
    }
  });

  $('btn-play') && $('btn-play').addEventListener('click', togglePlayPause);
  $('btn-stop') && $('btn-stop').addEventListener('click', stopPlayback);
  $('btn-prev') && $('btn-prev').addEventListener('click', prevTrack);
  $('btn-next') && $('btn-next').addEventListener('click', nextTrack);
  $('btn-shuf') && $('btn-shuf').addEventListener('click', () => {
    S.shuffle = !S.shuffle;
    $('btn-shuf').classList.toggle('on', S.shuffle);
    $('btn-shuf').setAttribute('aria-pressed', S.shuffle ? 'true' : 'false'); // A11Y FIX 2b
    $('btn-shuf-d') && $('btn-shuf-d').classList.toggle('on', S.shuffle);
    $('btn-shuf-d') && $('btn-shuf-d').setAttribute('aria-pressed', S.shuffle ? 'true' : 'false'); // A11Y FIX 2b
  });
  $('btn-rep') && $('btn-rep').addEventListener('click', () => cycleRepeat('btn-rep'));

  qsa('.btn-sort').forEach(btn => {
    btn.addEventListener('click', () => {
      const by = btn.dataset.sort;

      if (by === 'default') {
        qsa('.btn-sort').forEach(b => {
          b.classList.remove('active');
          b.textContent = b.dataset.sort.toUpperCase();
        });
        btn.classList.add('active');
        S.sortDir = 'asc';
        doSort('default', 'asc');
        return;
      }

      if (S.sortBy === by) {
        S.sortDir = S.sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        qsa('.btn-sort').forEach(b => {
          b.classList.remove('active');
          b.textContent = b.dataset.sort.toUpperCase();
        });
        S.sortDir = 'asc';
      }

      btn.classList.add('active');
      btn.textContent = by.toUpperCase() + (S.sortDir === 'asc' ? ' ▲' : ' ▼');
      doSort(by, S.sortDir);
    });
  });

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch (e.key) {
      case ' ':          e.preventDefault(); togglePlayPause(); break;
      case 'ArrowRight': nextTrack();         break;
      case 'ArrowLeft':  prevTrack();         break;
      case 's': case 'S': $('btn-shuf').click(); break;
      case 'r': case 'R': $('btn-rep').click();  break;
    }
  });

  window.addEventListener('resize', resizeCanvas);
}

/* ════════════════════════════════════════════════════════════════════
   WEB AUDIO + VISUALIZER
════════════════════════════════════════════════════════════════════ */
let audioCtx, analyser, visDraw = false;

const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent) ||
  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

function initVisualizer() {
  audio.addEventListener('play', () => {
    if (isIOS) {
      if (!visDraw) { visDraw = true; drawVis(); }
      return;
    }
    if (!audioCtx) setupAudio();
    if (audioCtx.state === 'suspended' || audioCtx.state === 'interrupted') {
      audioCtx.resume().catch(() => {});
    }
    if (!visDraw) { visDraw = true; drawVis(); }
  });

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && audioCtx) {
      if (audioCtx.state === 'suspended' || audioCtx.state === 'interrupted') {
        audioCtx.resume().catch(() => {});
      }
    }
  });

  requestAnimationFrame(drawVis);
}

function setupAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize               = 64;
  analyser.smoothingTimeConstant = 0.78;
  const src = audioCtx.createMediaElementSource(audio);
  src.connect(analyser);
  analyser.connect(audioCtx.destination);
}

function drawVis() {
  requestAnimationFrame(drawVis);

  const W = canvas.width;
  const H = canvas.height;

  const style  = getComputedStyle(app);
  const ledCol = style.getPropertyValue('--led').trim()     || '#14ff14';
  const dimCol = style.getPropertyValue('--led-dim').trim() || '#1a3a1a';

  ctx2d.clearRect(0, 0, W, H);

  if (!analyser) {
    const bars = 20, bw = Math.floor(W / bars) - 1;
    for (let i = 0; i < bars; i++) {
      ctx2d.fillStyle = dimCol;
      ctx2d.fillRect(i * (bw + 1), H - 2, bw, 2);
    }
    return;
  }

  const buf  = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(buf);

  const bars = Math.min(22, buf.length);
  const bw   = Math.max(1, Math.floor(W / bars) - 1);

  for (let i = 0; i < bars; i++) {
    const v  = buf[i] / 255;
    const bh = Math.max(2, Math.round(v * H));
    const x  = i * (bw + 1);

    if (v > 0.75)      ctx2d.fillStyle = '#ff3300';
    else if (v > 0.5)  ctx2d.fillStyle = '#ffaa00';
    else               ctx2d.fillStyle = ledCol;

    ctx2d.fillRect(x, H - bh, bw, bh);

    ctx2d.fillStyle = v > 0.1 ? ledCol : dimCol;
    ctx2d.fillRect(x, H - bh - 1, bw, 1);
  }
}

function resizeCanvas() {
  const wrap = canvas.parentElement;
  canvas.width  = wrap.clientWidth  || 280;
  canvas.height = wrap.clientHeight || 42;
}

/* ════════════════════════════════════════════════════════════════════
   UTILITIES
════════════════════════════════════════════════════════════════════ */
function fmtTime(s, long = false) {
  if (!s || isNaN(s) || s < 0) return long ? '0:00:00' : '0:00';
  s = Math.floor(s);
  const h   = Math.floor(s / 3600);
  const m   = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  if (long || h > 0) return `${h}:${pad(m)}:${pad(sec)}`;
  return `${m}:${pad(sec)}`;
}

function pad(n) { return String(n).padStart(2, '0'); }

function esc(str) {
  return String(str)
    .replace(/&/g,  '&amp;')
    .replace(/</g,  '&lt;')
    .replace(/>/g,  '&gt;')
    .replace(/"/g,  '&quot;')
    .replace(/'/g,  '&#39;');
}

/* ════════════════════════════════════════════════════════════════════
   SPARKLE GALAXY
════════════════════════════════════════════════════════════════════ */
function attachSparkle(linkEl) {
  const wrap = document.createElement('span');
  wrap.className = 'buy-sparkle-wrap';
  linkEl.parentNode.insertBefore(wrap, linkEl);
  wrap.appendChild(linkEl);

  const H   = 34;
  const cvs = document.createElement('canvas');
  cvs.className = 'buy-sparkle-canvas';
  wrap.appendChild(cvs);
  const ctx = cvs.getContext('2d');

  requestAnimationFrame(() => {
    cvs.width  = wrap.offsetWidth  || 120;
    cvs.height = H;
  });

  const W_fallback = 120;
  function W() { return cvs.width || W_fallback; }

  function themeColors() {
    return app.dataset.theme === 'memeshift'
      ? ['#FAC946', '#fcd97c', '#007998']
      : ['#14ff14', '#00cc00', '#ffffff'];
  }

  const MARGIN = 22;
  let particles = [];
  let rafId     = null;
  let running   = false;

  function randomBetween(a, b) { return a + Math.random() * (b - a); }

  function edgeFade(p) {
    const w  = W();
    const fx = Math.min(p.x / MARGIN, (w - p.x) / MARGIN, 1);
    const fy = Math.min(p.y / MARGIN, (H - p.y) / MARGIN, 1);
    return Math.max(0, Math.min(fx, fy));
  }

  function spawnParticle() {
    const w = W();
    return {
      x:       randomBetween(0, w),
      y:       H / 2 + randomBetween(-3, 3),
      r:       randomBetween(0.5, 2.2),
      alpha:   randomBetween(0.5, 1.0),
      da:      randomBetween(-0.009, -0.004),
      dx:      randomBetween(-0.225, 0.225),
      dy:      randomBetween(-0.275, 0.275),
      color:   themeColors()[Math.floor(Math.random() * 3)],
      twinkle: Math.random() * Math.PI * 2,
    };
  }

  function drawFrame() {
    const w = W();
    ctx.clearRect(0, 0, w, H);

    if (particles.length < 28) {
      particles.push(spawnParticle());
      if (Math.random() > 0.75) particles.push(spawnParticle());
    }

    particles = particles.filter(p => p.alpha > 0);

    for (const p of particles) {
      const pulse = 0.85 + 0.15 * Math.sin(p.twinkle);
      p.twinkle += 0.12;
      const a = p.alpha * pulse * edgeFade(p);
      const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 3.5);
      grd.addColorStop(0,   hexToRgba(p.color, a));
      grd.addColorStop(0.4, hexToRgba(p.color, a * 0.45));
      grd.addColorStop(1,   hexToRgba(p.color, 0));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 3.5, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = hexToRgba(p.color, Math.min(1, a * 1.4));
      ctx.fill();
      p.x += p.dx; p.y += p.dy; p.alpha += p.da;
    }

    if (running) rafId = requestAnimationFrame(drawFrame);
  }

  function start() {
    if (running) return;
    running = true;
    cvs.classList.add('visible');
    particles = [];
    drawFrame();
  }

  function stop() {
    running = false;
    cvs.classList.remove('visible');
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    setTimeout(() => { if (!running) ctx.clearRect(0, 0, W(), H); }, 220);
  }

  linkEl.addEventListener('mouseenter', start);
  linkEl.addEventListener('mouseleave', stop);
  linkEl.addEventListener('focus',      start);
  linkEl.addEventListener('blur',       stop);
}

function hexToRgba(hex, alpha) {
  let r, g, b;
  if (hex.length === 4) {
    r = parseInt(hex[1] + hex[1], 16);
    g = parseInt(hex[2] + hex[2], 16);
    b = parseInt(hex[3] + hex[3], 16);
  } else {
    r = parseInt(hex.slice(1, 3), 16);
    g = parseInt(hex.slice(3, 5), 16);
    b = parseInt(hex.slice(5, 7), 16);
  }
  return `rgba(${r},${g},${b},${alpha.toFixed(3)})`;
}

/* ════════════════════════════════════════════════════════════════════
   SOCIALS BURST
════════════════════════════════════════════════════════════════════ */
function burstSocials() {
  const container = $('socials-icons');
  if (!container) return;

  let cvs = container.querySelector('.socials-burst-canvas');
  if (!cvs) {
    cvs = document.createElement('canvas');
    cvs.className = 'socials-burst-canvas';
    container.appendChild(cvs);
  }

  const W = container.offsetWidth  || 100;
  const H = container.offsetHeight || 22;
  cvs.width  = W;
  cvs.height = H;

  const ctx    = cvs.getContext('2d');
  const COLORS = app.dataset.theme === 'memeshift'
    ? ['#FAC946', '#F90002', '#007998']
    : ['#14ff14', '#00cc00', '#ffffff'];
  const MARGIN = 10;

  let particles = [];
  for (let i = 0; i < 55; i++) {
    particles.push({
      x:       Math.random() * W,
      y:       H / 2 + (Math.random() - 0.5) * H * 0.6,
      r:       0.5 + Math.random() * 2.0,
      alpha:   0.6 + Math.random() * 0.4,
      da:      -(0.008 + Math.random() * 0.012),
      dx:      (Math.random() - 0.5) * 0.6,
      dy:      (Math.random() - 0.5) * 0.5,
      color:   COLORS[Math.floor(Math.random() * COLORS.length)],
      twinkle: Math.random() * Math.PI * 2,
    });
  }

  let canvasAlpha = 1;
  const fadeRate  = 1 / (3.0 * 60);
  let rafId;

  cvs.style.opacity    = '1';
  cvs.style.transition = 'none';

  function edgeFade(p) {
    const fx = Math.min(p.x / MARGIN, (W - p.x) / MARGIN, 1);
    const fy = Math.min(p.y / MARGIN, (H - p.y) / MARGIN, 1);
    return Math.max(0, Math.min(fx, fy));
  }

  function draw() {
    canvasAlpha -= fadeRate;
    if (canvasAlpha <= 0) {
      cvs.style.opacity = '0';
      ctx.clearRect(0, 0, W, H);
      return;
    }
    cvs.style.opacity = canvasAlpha.toFixed(3);
    ctx.clearRect(0, 0, W, H);
    particles = particles.filter(p => p.alpha > 0);
    for (const p of particles) {
      const pulse = 0.85 + 0.15 * Math.sin(p.twinkle);
      p.twinkle += 0.1;
      const a = p.alpha * pulse * edgeFade(p);
      const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 3.5);
      grd.addColorStop(0,   hexToRgba(p.color, a));
      grd.addColorStop(0.4, hexToRgba(p.color, a * 0.45));
      grd.addColorStop(1,   hexToRgba(p.color, 0));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 3.5, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = hexToRgba(p.color, Math.min(1, a * 1.4));
      ctx.fill();
      p.x += p.dx; p.y += p.dy; p.alpha += p.da;
    }
    rafId = requestAnimationFrame(draw);
  }

  cvs.style.opacity = '1';
  draw();
}

/* ════════════════════════════════════════════════════════════════════
   SHARE & EMBED
════════════════════════════════════════════════════════════════════ */
const PLAYER_BASE = 'https://music.memeshift.com';

function trackDeepLink(t) {
  return `${PLAYER_BASE}/?t=${t.file}`;
}

function nativeShare(t) {
  const url   = trackDeepLink(t);
  const title = (t.artist && t.title) ? `${t.artist} — ${t.title}` : (t.title || decodeURIComponent(t.file));
  if (navigator.share) {
    navigator.share({ title, text: `Listen to ${title} on Memeshift`, url }).catch(() => {});
  } else {
    navigator.clipboard.writeText(url).catch(() => {});
  }
}

function openEmbedModal(t) {
  const url       = trackDeepLink(t);
  const embedCode = `<iframe src="${PLAYER_BASE}/embed.php?t=${t.file}" width="100%" height="125" frameborder="0" style="border-radius:3px;max-width:640px;display:block"></iframe>`;

  $('embed-link-text').value = url;
  $('embed-code-text').value = embedCode;

  const modal = $('embed-modal');
  modal.style.display = 'flex';

  $('embed-link-text').addEventListener('click', function() { this.select(); }, { once: false });
  $('embed-code-text').addEventListener('click', function() { this.select(); }, { once: false });

  // Move focus to close button for keyboard/SR users
  requestAnimationFrame(() => $('embed-modal-close').focus());
}

$('embed-modal-close').addEventListener('click', closeEmbedModal);
$('embed-modal').addEventListener('click', e => {
  if (e.target === $('embed-modal')) closeEmbedModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeEmbedModal();
});

function closeEmbedModal() {
  $('embed-modal').style.display = 'none';
  // Return focus to the element that opened the modal
  const trigger = $('btn-share-link') || $('btn-share-icon');
  if (trigger) trigger.focus();
}
